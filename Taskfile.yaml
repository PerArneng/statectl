version: "3"

tasks:
  check:
    desc: Type-check the project with pyrefly
    cmds:
      - uv run pyrefly check

  diagram:
    desc: Module-dependency graph of statectl (pydeps) → diagrams/statectl.png
    cmds:
      - mkdir -p diagrams
      - uv run pydeps statectl --noshow -T png -o diagrams/statectl.png

  diagram-uml:
    desc: UML class + package diagrams of statectl (pyreverse) → diagrams/classes_statectl.png + diagrams/packages_statectl.png
    cmds:
      - mkdir -p diagrams
      - uv run pyreverse -o png -p statectl -d diagrams statectl

  diagram-uml-mmd:
    desc: UML class + package diagrams as Mermaid text (pyreverse) → diagrams/classes_statectl.mmd + diagrams/packages_statectl.mmd
    cmds:
      - mkdir -p diagrams
      - uv run pyreverse -o mmd -p statectl -d diagrams statectl

  diagram-uml-puml:
    desc: UML class + package diagrams as PlantUML text (pyreverse) → diagrams/classes_statectl.puml + diagrams/packages_statectl.puml
    cmds:
      - mkdir -p diagrams
      - uv run pyreverse -o puml -p statectl -d diagrams statectl

  diagrams:
    desc: Generate all diagrams (modules PNG; classes/packages as PNG + Mermaid + PlantUML) into diagrams/
    deps:
      - diagram
      - diagram-uml
      - diagram-uml-mmd
      - diagram-uml-puml
